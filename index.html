<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evyan Rider Builds</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", Arial;
    background: #f5f6f8;
}

/* LOGIN */
.login-container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1a73e8, #4f8df5);
}

.login-card {
    background: #fff;
    padding: 45px 30px;
    width: 400px;
    border-radius: 18px;
    text-align: center;
}

.login-logo {
    width: 90px;
    border-radius: 20px;
    margin-bottom: 15px;
}

.login-heading {
    font-size: 24px;
    font-weight: 600;
}

.login-subheading {
    font-size: 13px;
    color: #666;
    margin-bottom: 25px;
}

.login-card input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
}

/* MAIN */
.container {
    max-width: 850px;
    margin: 40px auto;
    background: #fff;
    padding: 25px;
    border-radius: 14px;
}

.card {
    display: flex;
    justify-content: space-between;
    padding: 12px;
    margin-top: 10px;
    border: 1px solid #eee;
    border-radius: 8px;
}

.latest {
    color: green;
    font-weight: bold;
}

.btn {
    background: #1a73e8;
    color: #fff;
    padding: 6px 12px;
    text-decoration: none;
}
</style>

<script>
const USER = {u:"evyan", p:"evyan"};

function login(){
    if(username.value===USER.u && password.value===USER.p){
        sessionStorage.setItem("auth","true");
        loadApp();
    } else {
        alert("Invalid login");
    }
}

function loadApp(){
    document.getElementById("login").style.display="none";
    document.getElementById("main").style.display="block";
    renderBuilds();
}

async function renderBuilds(){
    const res = await fetch('builds.json');
    let builds = await res.json();

    // sort latest first
    builds.sort((a,b)=> b.version.localeCompare(a.version, undefined, {numeric:true}));

    let list = document.getElementById("buildList");
    list.innerHTML = "";

    builds.forEach((b,i)=>{
        list.innerHTML += `
        <div class="card">
            <div>
                Version ${b.version}
                ${i===0 ? '<span class="latest"> (Latest)</span>' : ''}
            </div>
            <a class="btn" href="${b.link}" target="_blank">Download</a>
        </div>`;
    });
}

window.onload = function(){
    if(sessionStorage.getItem("auth")){
        loadApp();
    }
}
</script>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login-container">
    <div class="login-card">
        <img src="https://play-lh.googleusercontent.com/FdogNeQVvWNcvf0VCQAyMTYV7J7XR0IWWQlJyycEvFXlcprKiUGlmCuhnBUHp9O51DcBnnTKFQiOe7ocb5oDiw=w480-h960-rw" class="login-logo">
        <div class="login-heading">Evyan Rider Builds</div>
        <div class="login-subheading">UAT Access Portal</div>

        <input id="username" placeholder="Username">
        <input id="password" type="password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>
</div>

<!-- MAIN -->
<div id="main" style="display:none;">
    <div class="container">
        <h2>Evyan Rider Builds</h2>
        <div id="buildList"></div>
    </div>
</div>

</body>
</html>
