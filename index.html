<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evyan Rider Builds</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: #000;
    box-sizing: border-box;
}

/* ================= LOADER ================= */
.loader-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.loader {
    width: 45px;
    height: 45px;
    border: 5px solid #ccc;
    border-top: 5px solid #1a73e8;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* ================= LOGIN ================= */
.login-container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #000;
    padding: 12px;
}

.login-card {
    background: #fff;
    padding: 50px 60px;
    width: 380px;
    border-radius: 16px;
    text-align: center;
    box-sizing: border-box;
}

.login-logo {
    width: 85px;
    height: 85px;
    border-radius: 18px;
    margin-bottom: 20px;
}

.login-heading {
    font-size: 22px;
    font-weight: 600;
}

.login-subheading {
    font-size: 13px;
    color: #6b7280;
    margin-bottom: 28px;
}

.input-group {
    text-align: left;
    margin-bottom: 15px;
}

.input-group input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #d1d5db;
    font-size: 14px;
    box-sizing: border-box;
}

.login-btn {
    width: 100%;
    padding: 12px;
    background: #1a73e8;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
}

/* ================= MAIN ================= */
.container {
    max-width: 850px;
    margin: 40px auto;
    background: #fff;
    padding: 25px;
    border-radius: 14px;
    box-sizing: border-box;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.header-left {
    display: flex;
    align-items: center;
    gap: 12px;
}

.header-logo {
    width: 50px;
    border-radius: 12px;
}

.title {
    font-size: 20px;
    font-weight: 600;
}

.logout {
    color: red;
    cursor: pointer;
    font-size: 13px;
}

.card {
    display: flex;
    justify-content: space-between;
    padding: 12px;
    margin-top: 10px;
    border: 1px solid #eee;
    border-radius: 8px;
}

.latest {
    color: green;
    font-weight: bold;
}

.btn {
    background: #1a73e8;
    color: #fff;
    padding: 6px 12px;
    text-decoration: none;
    border-radius: 6px;
}

/* ================= MOBILE (UNCHANGED LOGIC) ================= */
@media (max-width: 600px) {

    body {
        padding: 12px;
    }

    .login-card {
        width: 100%;
        max-width: 360px;
        padding: 30px 20px;
    }

    .container {
        margin: 0;
        width: 100%;
        padding: 16px;
    }

    .card {
        flex-direction: column;
        gap: 10px;
    }

    .btn {
        width: 100%;
        text-align: center;
        padding: 10px;
    }
}
</style>

</head>

<body>

<!-- LOADER -->
<div id="loader" class="loader-overlay">
    <div class="loader"></div>
</div>

<!-- LOGIN -->
<div id="login" class="login-container">
    <div class="login-card">

        <img src="https://play-lh.googleusercontent.com/FdogNeQVvWNcvf0VCQAyMTYV7J7XR0IWWQlJyycEvFXlcprKiUGlmCuhnBUHp9O51DcBnnTKFQiOe7ocb5oDiw=w480-h960-rw"
             class="login-logo">

        <div class="login-heading">Evyan Rider Builds</div>
        <div class="login-subheading">UAT Access Portal</div>

        <div class="input-group">
            <input id="username" type="text" placeholder="Username">
        </div>

        <div class="input-group">
            <input id="password" type="password" placeholder="Password">
        </div>

        <button class="login-btn" onclick="login()">Login</button>

    </div>
</div>

<!-- MAIN -->
<div id="main" style="display:none;">
    <div class="container">

        <div class="header">
            <div class="header-left">
                <img src="https://play-lh.googleusercontent.com/FdogNeQVvWNcvf0VCQAyMTYV7J7XR0IWWQlJyycEvFXlcprKiUGlmCuhnBUHp9O51DcBnnTKFQiOe7ocb5oDiw=w480-h960-rw"
                     class="header-logo">
                <div class="title">Evyan Rider Builds</div>
            </div>

            <div class="logout" onclick="logout()">Logout</div>
        </div>

        <div id="buildList"></div>

    </div>
</div>

<script>
const USER = { u: "evyan", p: "evyan" };

function showLoader() {
    document.getElementById("loader").style.display = "flex";
}

function hideLoader() {
    document.getElementById("loader").style.display = "none";
}

/* LOGIN */
function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    if (username === USER.u && password === USER.p) {
        showLoader();

        setTimeout(() => {
            sessionStorage.setItem("auth", "true");
            loadApp();
        }, 1000);

    } else {
        alert("Invalid login");
    }
}

/* LOGOUT */
function logout() {
    sessionStorage.clear();
    location.reload();
}

/* LOAD APP */
function loadApp() {
    document.getElementById("login").style.display = "none";
    document.getElementById("main").style.display = "block";

    renderBuilds();
}

/* BUILD LIST */
async function renderBuilds() {
    showLoader();

    const res = await fetch('builds.json');
    let builds = await res.json();

    builds.sort((a, b) =>
        b.version.localeCompare(a.version, undefined, { numeric: true })
    );

    let list = document.getElementById("buildList");
    list.innerHTML = "";

    builds.forEach((b, i) => {
        list.innerHTML += `
        <div class="card">
            <div>
                Version ${b.version}
                ${i === 0 ? '<span class="latest"> (Latest)</span>' : ''}
            </div>
            <a class="btn" href="${b.link}" target="_blank">Download</a>
        </div>`;
    });

    hideLoader();
}

/* INIT */
window.onload = function () {
    if (sessionStorage.getItem("auth")) {
        loadApp();
    }
}
</script>

</body>
</html>
