<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evyan Rider Builds</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", Arial;
    background: #f5f6f8;
}

/* LOGIN */
.login-container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #ffffff;
}

.login-card {
    background: #fff;
    padding: 45px 30px;
    width: 400px;
    border-radius: 16px;
    text-align: center;
    border: 1px solid #eee;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}

.login-logo {
    width: 90px;
    height: 90px;
    border-radius: 20px;
    margin-bottom: 15px;
}

.login-heading {
    font-size: 24px;
    font-weight: 600;
}

.login-subheading {
    font-size: 13px;
    color: #666;
    margin-bottom: 25px;
}

.login-card input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* MAIN */
.container {
    max-width: 850px;
    margin: 40px auto;
    background: #fff;
    padding: 25px;
    border-radius: 14px;
    border: 1px solid #eee;
}

.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
}

.header-left {
    display: flex;
    align-items: center;
    gap: 12px;
}

.header-logo {
    width: 50px;
    border-radius: 12px;
}

.title {
    font-size: 20px;
    font-weight: 600;
}

.logout {
    cursor: pointer;
    color: red;
    font-size: 13px;
}

.card {
    display: flex;
    justify-content: space-between;
    padding: 12px;
    margin-top: 10px;
    border: 1px solid #eee;
    border-radius: 8px;
}

.latest {
    color: green;
    font-weight: bold;
}

.btn {
    background: #1a73e8;
    color: #fff;
    padding: 6px 12px;
    text-decoration: none;
    border-radius: 6px;
}
</style>

<script>
const USER = {u:"evyan", p:"evyan"};

function login(){
    if(username.value===USER.u && password.value===USER.p){
        sessionStorage.setItem("auth","true");
        loadApp();
    } else {
        alert("Invalid login");
    }
}

function logout(){
    sessionStorage.clear();
    location.reload();
}

function loadApp(){
    document.getElementById("login").style.display="none";
    document.getElementById("main").style.display="block";
    renderBuilds();
}

async function renderBuilds(){
    const res = await fetch('builds.json');
    let builds = await res.json();

    builds.sort((a,b)=> b.version.localeCompare(a.version, undefined, {numeric:true}));

    let list = document.getElementById("buildList");
    list.innerHTML = "";

    builds.forEach((b,i)=>{
        list.innerHTML += `
        <div class="card">
            <div>
                Version ${b.version}
                ${i===0 ? '<span class="latest"> (Latest)</span>' : ''}
            </div>
            <a class="btn" href="${b.link}" target="_blank">Download</a>
        </div>`;
    });
}

window.onload = function(){
    if(sessionStorage.getItem("auth")){
        loadApp();
    }
}
</script>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login-container">
    <div class="login-card">

        <!-- LOGO -->
        <img src="https://play-lh.googleusercontent.com/FdogNeQVvWNcvf0VCQAyMTYV7J7XR0IWWQlJyycEvFXlcprKiUGlmCuhnBUHp9O51DcBnnTKFQiOe7ocb5oDiw=w480-h960-rw"
             class="login-logo">

        <div class="login-heading">Evyan Rider Builds</div>
        <div class="login-subheading">UAT Access Portal</div>

        <input id="username" placeholder="Username">
        <input id="password" type="password" placeholder="Password">

        <button onclick="login()">Login</button>

    </div>
</div>

<!-- MAIN -->
<div id="main" style="display:none;">
    <div class="container">

        <!-- HEADER WITH LOGO -->
        <div class="header">
            <div class="header-left">
                <img src="https://play-lh.googleusercontent.com/FdogNeQVvWNcvf0VCQAyMTYV7J7XR0IWWQlJyycEvFXlcprKiUGlmCuhnBUHp9O51DcBnnTKFQiOe7ocb5oDiw=w480-h960-rw"
                     class="header-logo">
                <div class="title">Evyan Rider Builds</div>
            </div>

            <div class="logout" onclick="logout()">Logout</div>
        </div>

        <div id="buildList"></div>

    </div>
</div>

</body>
</html>
